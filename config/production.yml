# Malscanner Production Configuration
version: "1.0"
environment: production

# Security Pipeline Defaults
pipeline:
  fail_closed: true
  sequential_execution: true

# Pre-Flight Limits
limits:
  max_file_size_mb: 50
  max_zst_decompression_mb: 100
  max_compression_ratio: 100
  max_batch_size: 500

# File Type Whitelist (Extension -> Allowed MIME types)
whitelist:
  .csv: ["text/csv", "text/plain"]
  .parquet: ["application/octet-stream", "application/x-parquet", "application/vnd.apache.parquet"]
  .json: ["application/json", "text/plain"]
  .jsonl: ["application/json", "text/plain", "application/x-jsonlines", "application/x-ndjson"]
  .zst: ["application/zstd", "application/octet-stream"]
  .txt: ["text/plain"]
  .md: ["text/markdown", "text/plain", "text/html"]
  .pdf: ["application/pdf"]
  .xml: ["application/xml", "text/xml"]
  .svg: ["image/svg+xml"]

# Scanner Specific Settings
scanners:
  clamav:
    socket_path: "/var/run/clamav/clamd.ctl"
    timeout_seconds: 30
  yara:
    rules_dir: "yara"
    neo23x0_rules_enabled: true
  bleach:
    allowed_tags:
      - "p"
      - "b"
      - "i"
      - "u"
      - "em"
      - "strong"
      - "code"
      - "pre"
      - "h1"
      - "h2"
      - "h3"
      - "h4"
      - "h5"
      - "h6"
      - "ul"
      - "ol"
      - "li"
      - "blockquote"
      - "br"
      - "hr"
      - "a"
      - "span"
    allowed_attributes:
      "href": ["http", "https"]

# Monitoring & Logging
logging:
  level: INFO
  format: "json"
  path: "data/logs/app.log"
